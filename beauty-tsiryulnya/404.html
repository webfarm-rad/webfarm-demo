<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Страница не найдена — Цирюльня</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;600;700&family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Golos Text', sans-serif;
      background: #FAF7F5;
      color: #2D2A28;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .error-page {
      text-align: center;
      max-width: 480px;
    }
    .error-code {
      font-family: 'PT Sans', sans-serif;
      font-size: clamp(5rem, 15vw, 10rem);
      font-weight: 700;
      color: #C2185B;
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-family: 'PT Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }
    .error-text {
      color: #6B6560;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .error-btn {
      display: inline-block;
      padding: 0.875rem 2rem;
      background: #C2185B;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.3s;
    }
    .error-btn:hover {
      background: #A11548;
    }
  </style>
</head>
<body>
  <div class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Страница не найдена</h1>
    <p class="error-text">Такой страницы не существует или она была перемещена. Вернитесь на главную — там всё на месте.</p>
    <a href="index.html" class="error-btn">На главную</a>
  </div>
</body>
</html>
