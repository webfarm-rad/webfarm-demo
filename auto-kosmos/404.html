<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — Космос Авто</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Mulish', sans-serif;
            background: #0F1318;
            color: #E8EAED;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .error-page {
            text-align: center;
            max-width: 500px;
        }
        .error-code {
            font-family: 'Barlow', sans-serif;
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            color: #1565C0;
            line-height: 1;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }
        .error-title {
            font-family: 'Barlow', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .error-text {
            color: #9AA0A6;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .error-btn {
            display: inline-block;
            padding: 0.875rem 2rem;
            background: #1565C0;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s;
        }
        .error-btn:hover {
            background: #1976D2;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Страница не найдена</h1>
        <p class="error-text">Запрашиваемая страница не существует или была перемещена. Вернитесь на главную — наш автосервис работает без перебоев.</p>
        <a href="index.html" class="error-btn">На главную</a>
    </div>
</body>
</html>
